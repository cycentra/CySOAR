<svg xmlns="http://www.w3.org/2000/svg"
     width="100%"
     height="100%"
     viewBox="0 0 1200 800"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <!-- Brand gradient -->
    <linearGradient id="cyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0B1F3A"/>
      <stop offset="50%" stop-color="#1E40FF"/>
      <stop offset="100%" stop-color="#4FB6FF"/>
    </linearGradient>
  </defs>

  <!-- CY Monogram (full-screen dominant) -->
  <g transform="translate(360,160) scale(1.6)" fill="url(#cyGradient)">

    <!-- C -->
    <path d="
      M160 0
      H70
      C25 0 0 25 0 70
      V170
      C0 215 25 240 70 240
      H160
      V205
      H90
      C60 205 45 190 45 160
      V80
      C45 50 60 35 90 35
      H160
      Z"/>

    <!-- Y (closer to C) -->
    <path d="
      M190 0
      H230
      V90
      L270 160
      V240
      H230
      V165
      L190 95
      Z"/>

  </g>

  <!-- Divider line -->
  <rect x="360" y="560" width="480" height="4"
        fill="#6CB6FF" opacity="0.35"/>

  <!-- Tagline -->
  <text
    x="600"
    y="630"
    text-anchor="middle"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="34"
    letter-spacing="0.28em"
    fill="#6CB6FF">
    FROM SIGNALS TO STRENGTH
  </text>

</svg>
